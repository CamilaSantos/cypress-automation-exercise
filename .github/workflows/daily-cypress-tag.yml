name: Daily Cypress Test & Tag

on:
  push:
    branches:
      - main # Este workflow será acionado toda vez que houver um push para a branch 'develop'
  workflow_dispatch: # Permite que você execute este workflow manualmente na aba "Actions" do GitHub

jobs:
  run-tests-and-tag:
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Baixa o código do seu repositório para a máquina virtual

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Define a versão do Node.js. Use a versão que você usa localmente.
                             # Se você usa Node 20, mude para '20'.

      - name: Install Dependencies
        run: npm install # Executa o comando para instalar todas as dependências do seu package.json

      - name: Run Cypress Tests
        run: npx cypress run # Executa seus testes Cypress em modo headless

      - name: Get Current Date and Time
        id: date
        run: echo "TIMESTAMP=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
        # Gera um timestamp para usar no nome da tag, garantindo unicidade

      - name: Create Git Tag for Daily Test Run
        run: |
          TAG_NAME="daily-test-${{ steps.date.outputs.TIMESTAMP }}"
          echo "Creating tag: $TAG_NAME"
          git config user.name "GitHub Actions" # Configura o nome do usuário para o commit/tag
          git config user.email "actions@github.com" # Configura o email do usuário
          git tag $TAG_NAME # Cria a tag localmente
          git push origin $TAG_NAME # Envia a tag para o repositório remoto no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Results to Allure Server
        if: always()
        run: |
           echo "Transmitindo arquivos de /opt/allure/allure-results para a API..."
           
           node -e '
           const fs = require("fs");
           const path = require("path");
           const http = require("http");

           const resultsDir = "/opt/allure/allure-results";
           
           if (!fs.existsSync(resultsDir)) {
             console.log(`Erro: Diretorio ${resultsDir} nao encontrado.`);
             process.exit(1);
           }

           const files = fs.readdirSync(resultsDir).filter(f => fs.lstatSync(path.join(resultsDir, f)).isFile());
           const results = files.map(file => {
             const filePath = path.join(resultsDir, file);
             return {
               file_name: file,
               content_base64: fs.readFileSync(filePath).toString("base64")
             };
           });

           if (results.length === 0) {
             console.log("Nenhum arquivo encontrado para envio.");
             process.exit(0);
           }

           const payload = JSON.stringify({ results });

           // Envia os dados brutos para o motor (Porta 5050)
           const req = http.request({
             hostname: "172.22.91.100",
             port: 5050,
             path: "/allure-docker-service/send-results?project_id=default",
             method: "POST",
             headers: {
               "Content-Type": "application/json",
               "Content-Length": Buffer.byteLength(payload)
             }
           }, (res) => {
             res.on("data", () => {});
             res.on("end", () => {
               console.log("Arquivos enviados com sucesso. Solicitando geracao do relatorio...");
               
               // Solicita a geracao do relatorio no motor (Porta 5050)
               http.get("http://172.22.91.100:5050/allure-docker-service/generate-report?project_id=default", (res2) => {
                 console.log("Processamento concluido na API.");
               });
             });
           });

           req.on("error", (err) => console.error("Erro na API:", err.message));
           req.write(payload);
           req.end();
           '